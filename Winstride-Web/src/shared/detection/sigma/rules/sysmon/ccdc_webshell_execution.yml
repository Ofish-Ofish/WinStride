title: Web Server Spawned Shell (Webshell/RCE)
id: b0000001-0000-0000-0000-000000000005
name: webshell_execution
status: stable
description: A web server process spawned a command shell — indicates webshell access or remote code execution.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.persistence
    - attack.t1505.003
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\w3wp.exe'
            - '\httpd.exe'
            - '\nginx.exe'
            - '\tomcat.exe'
            - '\java.exe'
            - '\php-cgi.exe'
            - '\node.exe'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    condition: selection_parent and selection_child
level: critical

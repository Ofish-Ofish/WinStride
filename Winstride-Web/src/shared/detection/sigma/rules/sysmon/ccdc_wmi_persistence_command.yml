title: WMI Event Subscription Command
id: b0000001-0000-0000-0000-000000000033
name: wmi_persistence_command
status: stable
description: A WMI event subscription command was executed — used to establish persistent backdoor execution that survives reboots.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.persistence
    - attack.t1546.003
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\wmic.exe'
    selection_sub:
        CommandLine|contains:
            - 'EventFilter'
            - 'EventConsumer'
            - 'FilterToConsumerBinding'
    condition: selection and selection_sub
level: high

title: Image File Execution Options Debugger Set
id: b0000001-0000-0000-0000-000000000031
name: registry_ifeo
status: stable
description: An Image File Execution Options debugger was set — allows intercepting and hijacking process execution for persistence or credential harvesting.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.persistence
    - attack.t1546.012
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|contains: '\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\'
        TargetObject|endswith: '\Debugger'
    condition: selection
level: high

title: PowerShell Download Cradle
id: b0000001-0000-0000-0000-000000000007
name: powershell_download_cradle
status: stable
description: PowerShell launched with download cradle arguments — common initial access and staging technique.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.execution
    - attack.t1105
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_cradle:
        CommandLine|contains:
            - 'DownloadString'
            - 'DownloadFile'
            - 'Invoke-WebRequest'
            - 'Start-BitsTransfer'
            - 'Net.WebClient'
            - 'wget '
            - 'curl '
            - 'iwr '
    condition: selection_process and selection_cradle
level: high

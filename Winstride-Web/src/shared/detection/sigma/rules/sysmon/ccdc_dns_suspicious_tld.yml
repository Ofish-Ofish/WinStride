title: DNS Query to Suspicious TLD
id: b0000001-0000-0000-0000-000000000025
name: dns_suspicious_tld
status: stable
description: A DNS query targeted a frequently abused top-level domain — commonly used for C2, phishing, and malware hosting.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.command-and-control
    - attack.t1071.004
logsource:
    category: dns_query
    product: windows
detection:
    selection:
        QueryName|endswith:
            - '.tk'
            - '.top'
            - '.xyz'
            - '.cc'
            - '.pw'
            - '.club'
            - '.work'
            - '.buzz'
            - '.gq'
            - '.ml'
            - '.cf'
            - '.ga'
    condition: selection
level: low

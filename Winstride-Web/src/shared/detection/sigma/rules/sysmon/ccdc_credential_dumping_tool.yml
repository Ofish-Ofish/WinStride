title: Credential Dumping Tool Execution
id: b0000001-0000-0000-0000-000000000006
name: credential_dumping_tool
status: stable
description: A known credential dumping tool was detected in process image or command line.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.credential-access
    - attack.t1003
logsource:
    category: process_creation
    product: windows
detection:
    selection_cmdline:
        CommandLine|contains:
            - 'mimikatz'
            - 'procdump'
            - 'lazagne'
            - 'secretsdump'
            - 'pypykatz'
            - 'nanodump'
            - 'safetykatz'
            - 'sharpkatz'
            - 'dumpert'
    selection_image:
        Image|contains:
            - 'mimikatz'
            - 'procdump'
            - 'lazagne'
            - 'secretsdump'
            - 'pypykatz'
            - 'nanodump'
    condition: 1 of selection_*
level: critical

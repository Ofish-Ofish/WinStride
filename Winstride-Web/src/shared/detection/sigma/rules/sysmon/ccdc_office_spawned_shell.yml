title: Office Application Spawned Shell
id: b0000001-0000-0000-0000-000000000001
name: office_spawned_shell
status: stable
description: An Office application spawned a command shell — possible macro execution or document exploit.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.execution
    - attack.t1204.002
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\winword.exe'
            - '\excel.exe'
            - '\powerpnt.exe'
            - '\outlook.exe'
            - '\msaccess.exe'
            - '\mspub.exe'
            - '\onenote.exe'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    condition: selection_parent and selection_child
level: high

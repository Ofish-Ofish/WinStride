title: System Service Spawned Shell
id: b0000001-0000-0000-0000-000000000022
name: services_spawned_shell
status: stable
description: A system service process spawned a command shell — may indicate malicious service execution, scheduled task abuse, or lateral movement.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.execution
    - attack.t1569.002
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith:
            - '\services.exe'
            - '\spoolsv.exe'
            - '\taskeng.exe'
            - '\taskhostw.exe'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
    condition: selection_parent and selection_child
level: medium

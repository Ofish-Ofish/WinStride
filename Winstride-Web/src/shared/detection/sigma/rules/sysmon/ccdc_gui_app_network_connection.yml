title: GUI Application Making Network Connection
id: b0000001-0000-0000-0000-000000000040
name: gui_app_network_connection
status: stable
description: A GUI desktop application that should never communicate over the network made a connection — indicates process injection or masquerading.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.command-and-control
    - attack.t1071
logsource:
    category: network_connection
    product: windows
detection:
    selection:
        Image|endswith:
            - '\notepad.exe'
            - '\calc.exe'
            - '\mspaint.exe'
            - '\write.exe'
            - '\wordpad.exe'
            - '\help.exe'
    filter_localhost:
        DestinationIp|startswith:
            - '127.'
            - '::1'
    condition: selection and not filter_localhost
level: high

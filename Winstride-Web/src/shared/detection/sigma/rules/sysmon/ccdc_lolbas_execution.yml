title: LOLBAS Binary Execution
id: b0000001-0000-0000-0000-000000000002
name: lolbas_execution
status: stable
description: A Living Off the Land binary was executed — commonly abused for defense evasion and code execution. Excludes rundll32/msiexec/regsvr32/csc which fire constantly in normal Windows operation.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.defense-evasion
    - attack.t1218
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\certutil.exe'
            - '\bitsadmin.exe'
            - '\mshta.exe'
            - '\cmstp.exe'
            - '\installutil.exe'
            - '\regasm.exe'
            - '\regsvcs.exe'
            - '\msbuild.exe'
            - '\wmic.exe'
            - '\forfiles.exe'
    condition: selection
level: medium

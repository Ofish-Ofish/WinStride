title: WMI Spawned Shell Process
id: b0000001-0000-0000-0000-000000000011
name: wmi_shell_spawn
status: stable
description: WMI provider host spawned a command shell — indicates WMI-based lateral movement or execution.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.execution
    - attack.t1047
logsource:
    category: process_creation
    product: windows
detection:
    selection_parent:
        ParentImage|endswith: '\WmiPrvSE.exe'
    selection_child:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    condition: selection_parent and selection_child
level: high

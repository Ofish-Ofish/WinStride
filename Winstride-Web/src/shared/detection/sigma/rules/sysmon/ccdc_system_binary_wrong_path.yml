title: System Binary Running from Wrong Directory
id: b0000001-0000-0000-0000-000000000039
name: system_binary_wrong_path
status: stable
description: A Windows system binary name was detected running from a non-standard directory — indicates binary masquerading or dropped malware.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.defense-evasion
    - attack.t1036.005
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\svchost.exe'
            - '\lsass.exe'
            - '\csrss.exe'
            - '\smss.exe'
            - '\wininit.exe'
            - '\services.exe'
    filter_system32:
        Image|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Windows\SysWOW64\'
    condition: selection and not filter_system32
level: critical

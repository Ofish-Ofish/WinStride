title: PowerShell Encoded Command Execution
id: b0000001-0000-0000-0000-000000000004
name: powershell_encoded_command
status: stable
description: PowerShell was launched with an encoded command — common obfuscation and evasion technique used by attack frameworks.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_process:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_flags:
        CommandLine|contains:
            - ' -enc '
            - ' -EncodedCommand '
            - 'FromBase64String'
    condition: selection_process and selection_flags
level: high

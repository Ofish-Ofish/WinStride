title: Script Execution from Suspicious Directory
id: b0000001-0000-0000-0000-000000000035
name: script_from_suspicious_dir
status: stable
description: A script interpreter loaded a script from a suspicious directory — common initial access and persistence pattern.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.execution
    - attack.t1059
logsource:
    category: process_creation
    product: windows
detection:
    selection_interpreter:
        Image|endswith:
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    selection_path:
        CommandLine|contains:
            - '\Temp\'
            - '\Downloads\'
            - '\PerfLogs\'
            - '\Public\'
            - '\Recycle'
            - '\AppData\'
    condition: selection_interpreter and selection_path
level: high

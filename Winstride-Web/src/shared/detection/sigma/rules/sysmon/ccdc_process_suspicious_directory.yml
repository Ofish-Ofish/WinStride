title: Process Executed from Suspicious Directory
id: b0000001-0000-0000-0000-000000000003
name: process_suspicious_directory
status: stable
description: A process was started from a suspicious directory (Temp, Recycle Bin, PerfLogs) — possible malware staging.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.defense-evasion
    - attack.t1036
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|contains:
            - '\Temp\'
            - '\Tmp\'
            - '\PerfLogs\'
            - '\Recycler\'
            - '$Recycle.Bin'
    condition: selection
level: medium

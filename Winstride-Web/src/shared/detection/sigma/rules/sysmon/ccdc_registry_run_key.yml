title: Registry Run Key Modification via CLI
id: b0000001-0000-0000-0000-000000000010
name: registry_run_key
status: stable
description: A registry run key was modified via command line — classic persistence mechanism.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.persistence
    - attack.t1547.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\reg.exe'
        CommandLine|contains: 'add'
    selection_keys:
        CommandLine|contains:
            - '\Run'
            - '\RunOnce'
    condition: selection and selection_keys
level: medium

title: Executable Dropped in System Directory
id: b0000001-0000-0000-0000-000000000028
name: file_drop_system_dir
status: stable
description: An executable or script file was created in a Windows system directory by a non-trusted process — may indicate malware installation or backdoor deployment.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.persistence
    - attack.t1036
logsource:
    category: file_event
    product: windows
detection:
    selection_path:
        TargetFilename|contains:
            - '\Windows\System32\'
            - '\Windows\SysWOW64\'
    selection_ext:
        TargetFilename|endswith:
            - '.exe'
            - '.dll'
            - '.sys'
            - '.bat'
            - '.ps1'
            - '.vbs'
    filter_trusted:
        Image|endswith:
            - '\svchost.exe'
            - '\msiexec.exe'
            - '\TiWorker.exe'
            - '\TrustedInstaller.exe'
            - '\wuauclt.exe'
            - '\MsMpEng.exe'
            - '\MpCmdRun.exe'
            - '\poqexec.exe'
            - '\dism.exe'
    condition: selection_path and selection_ext and not filter_trusted
level: medium

title: Firewall Disabled via PowerShell
id: b0000002-0000-0000-0000-000000000018
name: ps_firewall_tamper
status: stable
description: PowerShell commands disable or modify Windows Firewall — may indicate an attacker opening network access.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.defense-evasion
    - attack.t1562.004
logsource:
    category: ps_script
    product: windows
detection:
    selection_cmdlet:
        ScriptBlockText|contains:
            - 'Set-NetFirewallProfile'
            - 'Disable-NetFirewallRule'
            - 'Remove-NetFirewallRule'
    selection_netsh:
        ScriptBlockText|contains|all:
            - 'netsh'
            - 'firewall'
    condition: 1 of selection_*
level: high

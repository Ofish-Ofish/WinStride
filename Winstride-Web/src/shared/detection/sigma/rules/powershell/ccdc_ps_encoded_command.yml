title: PowerShell Encoded Command in Script Block
id: b0000002-0000-0000-0000-000000000001
name: ps_encoded_command
status: stable
description: A PowerShell script block contains Base64 decoding or encoded command patterns — common obfuscation technique.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: ps_script
    product: windows
detection:
    selection:
        ScriptBlockText|contains:
            - 'FromBase64String'
            - 'EncodedCommand'
    condition: selection
level: high

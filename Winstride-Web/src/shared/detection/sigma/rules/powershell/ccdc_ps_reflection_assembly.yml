title: PowerShell Reflective Assembly Loading
id: b0000002-0000-0000-0000-000000000006
name: ps_reflection_assembly
status: stable
description: A PowerShell script block loads .NET assemblies reflectively — common in offensive tools to avoid disk.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.defense-evasion
    - attack.t1620
logsource:
    category: ps_script
    product: windows
detection:
    selection:
        ScriptBlockText|contains|all:
            - 'Reflection.Assembly'
            - 'Load'
    condition: selection
level: medium

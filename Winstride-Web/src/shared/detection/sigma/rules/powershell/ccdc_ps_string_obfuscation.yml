title: PowerShell String Obfuscation Detected
id: b0000002-0000-0000-0000-000000000010
name: ps_string_obfuscation
status: stable
description: A PowerShell script block contains heavy obfuscation patterns (char casts, string concatenation, replace chains).
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.defense-evasion
    - attack.t1027
logsource:
    category: ps_script
    product: windows
detection:
    selection_char:
        ScriptBlockText|re: '(\[char\]\s*\d+.*){4,}'
    selection_join:
        ScriptBlockText|contains|all:
            - '[char[]]'
            - '-join'
    selection_replace:
        ScriptBlockText|re: '(-replace.*){4,}'
    condition: 1 of selection_*
level: medium

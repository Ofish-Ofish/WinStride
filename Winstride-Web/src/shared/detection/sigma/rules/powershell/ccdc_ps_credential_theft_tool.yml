title: PowerShell Credential Theft Tool
id: b0000002-0000-0000-0000-000000000004
name: ps_credential_theft_tool
status: stable
description: A PowerShell script block references a known credential theft or AD attack tool.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.credential-access
    - attack.t1003
logsource:
    category: ps_script
    product: windows
detection:
    selection:
        ScriptBlockText|contains:
            - 'Invoke-Mimikatz'
            - 'Invoke-Kerberoast'
            - 'Invoke-Rubeus'
            - 'Invoke-BloodHound'
            - 'Invoke-SharpHound'
            - 'Get-GPPPassword'
            - 'Invoke-DCSync'
            - 'Invoke-NinjaCopy'
            - 'Invoke-SMBExec'
            - 'Invoke-WMIExec'
    condition: selection
level: critical

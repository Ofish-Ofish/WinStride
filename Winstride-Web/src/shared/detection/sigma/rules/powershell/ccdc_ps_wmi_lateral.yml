title: WMI Lateral Movement via PowerShell
id: b0000002-0000-0000-0000-000000000016
name: ps_wmi_lateral
status: stable
description: PowerShell WMI commands targeting remote computers — indicates lateral movement or remote reconnaissance.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.lateral-movement
    - attack.t1047
logsource:
    category: ps_script
    product: windows
detection:
    selection_wmi:
        ScriptBlockText|contains:
            - 'Get-WmiObject'
            - 'Invoke-WmiMethod'
            - 'Set-WmiInstance'
            - 'Get-CimInstance'
            - 'Invoke-CimMethod'
    selection_remote:
        ScriptBlockText|contains: '-ComputerName'
    condition: selection_wmi and selection_remote
level: medium

title: Event Log Tampering via PowerShell
id: b0000002-0000-0000-0000-000000000019
name: ps_eventlog_tamper
status: stable
description: PowerShell commands clear or disable event logging — strong indicator of anti-forensics activity.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.defense-evasion
    - attack.t1070.001
logsource:
    category: ps_script
    product: windows
detection:
    selection_clear:
        ScriptBlockText|contains:
            - 'Clear-EventLog'
            - 'Remove-EventLog'
    selection_wevtutil:
        ScriptBlockText|contains|all:
            - 'wevtutil'
            - 'cl'
    selection_stop_svc:
        ScriptBlockText|contains|all:
            - 'Stop-Service'
            - 'EventLog'
    condition: 1 of selection_*
level: critical

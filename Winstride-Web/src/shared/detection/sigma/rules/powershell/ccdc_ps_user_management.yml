title: User Account Management via PowerShell
id: b0000002-0000-0000-0000-000000000022
name: ps_user_management
status: stable
description: PowerShell commands create users or modify group membership — may indicate an attacker establishing persistent access.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.persistence
    - attack.t1136.001
logsource:
    category: ps_script
    product: windows
detection:
    selection:
        ScriptBlockText|contains:
            - 'New-LocalUser'
            - 'Add-LocalGroupMember'
            - 'net user '
            - 'net localgroup '
    condition: selection
level: high

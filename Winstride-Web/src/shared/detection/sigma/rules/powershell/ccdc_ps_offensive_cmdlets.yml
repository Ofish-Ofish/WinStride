title: Offensive PowerShell Cmdlet Execution
id: b0000002-0000-0000-0000-000000000013
name: ps_offensive_cmdlets
status: stable
description: A PowerShell script uses cmdlets from known offensive frameworks (PowerSploit, PowerUp, Nishang, Inveigh) — strong indicator of attack tooling.
author: WinStride CCDC
date: 2025-01-01
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: ps_script
    product: windows
detection:
    selection:
        ScriptBlockText|contains:
            - 'Invoke-Shellcode'
            - 'Invoke-DllInjection'
            - 'Invoke-ReflectivePEInjection'
            - 'Get-Keystrokes'
            - 'Get-TimedScreenshot'
            - 'Invoke-CredentialInjection'
            - 'Invoke-TokenManipulation'
            - 'Invoke-Portscan'
            - 'Invoke-AllChecks'
            - 'Get-ServiceUnquoted'
            - 'Invoke-ServiceAbuse'
            - 'Invoke-PowerShellTcp'
            - 'Invoke-PowerShellUdp'
            - 'Invoke-Inveigh'
            - 'Invoke-InveighRelay'
            - 'Invoke-TheHash'
    condition: selection
level: critical
